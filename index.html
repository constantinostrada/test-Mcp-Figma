<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Figma MCP Test Application" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Figma-MCP-Test</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Figma-MCP-Test</h1>
        <p class="subtitle">A modern Vite-powered web application</p>
      </header>

      <main class="main">
        <section class="card counter-card">
          <h2>Counter App</h2>
          <div class="counter-display">
            <span id="counter">0</span>
          </div>
          <div class="counter-controls">
            <button
              id="increment-btn"
              class="button button-increment"
              type="button"
            >
              Increment
            </button>
            <button
              id="decrement-btn"
              class="button button-decrement"
              type="button"
            >
              Decrement
            </button>
            <button id="reset-btn" class="button button-reset" type="button">
              Reset
            </button>
          </div>
        </section>

        <section class="card">
          <h3>Get Started</h3>
          <ul class="feature-list">
            <li>⚡️ Lightning-fast HMR with Vite</li>
            <li>🎨 Modern CSS with best practices</li>
            <li>📦 Optimized production builds</li>
            <li>✨ Code quality with ESLint & Prettier</li>
          </ul>
        </section>
      </main>

      <footer class="footer">
        <p>Built with ❤️ using Vite</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
