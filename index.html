<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Figma MCP Test Application" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>Figma-MCP-Test</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Figma-MCP-Test</h1>
        <p class="subtitle">A modern Vite-powered web application</p>
      </header>

      <main class="main">
        <section class="counter-card">
          <h2 class="counter-title">Counter App</h2>
          <div class="counter-display" id="counter-display">0</div>
          <div class="counter-controls">
            <button
              id="increment-btn"
              class="counter-button counter-button-increment"
              type="button"
            >
              Increment
            </button>
            <button
              id="decrement-btn"
              class="counter-button counter-button-decrement"
              type="button"
            >
              Decrement
            </button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>Built with ❤️ using Vite</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
