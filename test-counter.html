<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Counter Functionality Tests</h1>
    <div id="test-results"></div>

    <script type="module">
        import { setupCounter, getCounterValue } from './src/js/counter.js';

        const resultsDiv = document.getElementById('test-results');

        function addResult(testName, passed, message) {
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'pass' : 'fail'}`;
            div.textContent = `${passed ? '✓' : '✗'} ${testName}: ${message}`;
            resultsDiv.appendChild(div);
        }

        // Create test elements
        const counterDisplay = document.createElement('span');
        counterDisplay.id = 'counter';
        const incrementBtn = document.createElement('button');
        const decrementBtn = document.createElement('button');
        const resetBtn = document.createElement('button');

        document.body.appendChild(counterDisplay);

        // Setup counter
        setupCounter(counterDisplay, incrementBtn, decrementBtn, resetBtn);

        // Test 1: Initial value should be 0
        let currentValue = getCounterValue();
        addResult('Initial Value', currentValue === 0, `Counter starts at ${currentValue}`);

        // Test 2: Increment button increases counter
        incrementBtn.click();
        currentValue = getCounterValue();
        addResult('Increment', currentValue === 1, `Counter incremented to ${currentValue}`);

        // Test 3: Multiple increments
        incrementBtn.click();
        incrementBtn.click();
        currentValue = getCounterValue();
        addResult('Multiple Increments', currentValue === 3, `Counter at ${currentValue} after 3 total increments`);

        // Test 4: Decrement button decreases counter
        decrementBtn.click();
        currentValue = getCounterValue();
        addResult('Decrement', currentValue === 2, `Counter decremented to ${currentValue}`);

        // Test 5: Reset button sets counter to 0
        resetBtn.click();
        currentValue = getCounterValue();
        addResult('Reset', currentValue === 0, `Counter reset to ${currentValue}`);

        // Test 6: Can increment after reset
        incrementBtn.click();
        currentValue = getCounterValue();
        addResult('Increment After Reset', currentValue === 1, `Counter at ${currentValue} after reset and increment`);

        // Test 7: Can decrement below zero
        resetBtn.click();
        decrementBtn.click();
        currentValue = getCounterValue();
        addResult('Negative Values', currentValue === -1, `Counter can go negative: ${currentValue}`);

        // Test 8: Reset from negative value
        resetBtn.click();
        currentValue = getCounterValue();
        addResult('Reset from Negative', currentValue === 0, `Counter reset from negative to ${currentValue}`);

        console.log('All tests completed!');
    </script>
</body>
</html>
